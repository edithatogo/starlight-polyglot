name: Publish to npm (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter starlight-polyglot build

      - name: Publish to npm
        run: npm publish --access public --tag ${{ github.event.inputs.tag }}
        working-directory: packages/starlight-polyglot
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
