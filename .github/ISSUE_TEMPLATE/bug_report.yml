name: Bug Report
description: Report a bug in starlight-polyglot
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: input
    id: version
    attributes:
      label: starlight-polyglot version
      description: What version of starlight-polyglot are you running? (Check your package.json)
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: astro-version
    attributes:
      label: Astro & Starlight versions
      description: What versions of Astro and @astrojs/starlight are you using?
      placeholder: "astro@6.0.0, @astrojs/starlight@0.39.0"
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language handler affected
      description: Which language handler is the bug related to?
      options:
        - Python
        - TypeScript
        - Rust
        - R
        - Julia
        - C#
        - Go
        - Core plugin (language-agnostic)
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue? Include your polyglot configuration and source structure.
      placeholder: |
        1. Configure polyglot with `{ python: { entryPoints: [...] } }`
        2. Run `astro build` (or `astro dev`)
        3. See error...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Minimal reproduction repository
      description: Link to a minimal repository that reproduces the issue (optional, but very helpful)
      placeholder: "https://github.com/your-username/repro-repo"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code blocks.
      render: shell
